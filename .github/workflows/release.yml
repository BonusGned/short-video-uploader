name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cli_artifact: crosspost-cli-linux-amd64
            gui_artifact: crosspost-gui-linux-amd64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cli_artifact: crosspost-cli-linux-arm64
            gui_artifact: crosspost-gui-linux-arm64

          - target: x86_64-apple-darwin
            os: macos-latest
            cli_artifact: crosspost-cli-macos-amd64
            gui_artifact: crosspost-gui-macos-amd64

          - target: aarch64-apple-darwin
            os: macos-latest
            cli_artifact: crosspost-cli-macos-arm64
            gui_artifact: crosspost-gui-macos-arm64

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cli_artifact: crosspost-cli-windows-amd64.exe
            gui_artifact: crosspost-gui-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux dependencies (native builds)
        if: runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev pkg-config \
            libdbus-1-dev libsecret-1-dev

      - name: Install cross for cross-compilation
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release (native)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Build release (cross-compilation)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --workspace --release --target ${{ matrix.target }}

      - name: Prepare artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/crosspost-cli ${{ matrix.cli_artifact }}
          cp target/${{ matrix.target }}/release/crosspost-gui ${{ matrix.gui_artifact }}

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/crosspost-cli.exe ${{ matrix.cli_artifact }}
          cp target/${{ matrix.target }}/release/crosspost-gui.exe ${{ matrix.gui_artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ matrix.cli_artifact }}
            ${{ matrix.gui_artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect binaries
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Generate checksums
        working-directory: release
        run: sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
